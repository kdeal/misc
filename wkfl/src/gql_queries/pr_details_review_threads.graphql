query PrDetailsReviewThreads($owner: String!, $name: String!, $prNumber: Int!, $cursor: String) {
    repository(owner: $owner, name: $name) {
        pullRequest(number: $prNumber) {
            reviewThreads(first: 100, after: $cursor) {
                nodes {
                    id
                    isResolved
                    diffSide
                    startDiffSide
                    comments(first: 100) {
                        nodes {
                            body
                            author {
                                login
                                __typename
                            }
                            createdAt
                            path
                            originalLine
                            originalStartLine
                            diffHunk
                        }
                        pageInfo {
                            hasNextPage
                            endCursor
                        }
                    }
                }
                pageInfo {
                    hasNextPage
                    endCursor
                }
            }
        }
    }
}
